<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./src/css/reset.css">    
    <link rel="stylesheet" href="./src/css/style.css">
    <link rel="stylesheet" href="./src/css/responsive.css">

    <title>Pictures List Page</title>
</head>
<body>
    <main>
        <section class="pictures">

            <div class="picture">
                <img src="./src/imagens/rome.png" alt="Rome">
                <div class="info">
                    <h2 class="titulo">Rome</h2>
                    <h3 class="sub-titulo">Michelangelo</h3>
                </div>
            </div>

            <div class="picture">
                <img src="./src/imagens/boat.png" alt="Boat">
                <div class="info">
                    <h2 class="titulo">Boat at Sea</h2>
                    <h3 class="sub-titulo">Vicent van Gogh</h3>
                </div>
            </div>

                <div class="picture">  
                <img src="./src/imagens/sand-and-sea.png" alt="Sand and Sea">
                <div class="info">
                    <h2 class="titulo">Sand and Sea</h2>
                    <h3 class="sub-titulo">Da Vinci</h3>
                </div>
            </div>

                <div class="picture">
                <img src="./src/imagens/starry-night.png" alt="Starry Night">
                <div class="info">      
                    <h2 class="titulo">Starry Night</h2>
                    <h3 class="sub-titulo ">Vincent van Gogh</h3>   
                </div>
            </div>

        </section>
    </main>
</body>
</html>
